<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#07111f"/>
  <style>.box{fill:#0d1b2f;stroke:#6b7c93;stroke-width:2}.txt{fill:#f8fbff;font-family:Arial;font-size:18px}.line{stroke:#94a3b8;stroke-width:3}</style>
  <g transform="translate(60,90)">
    <rect class="box" width="150" height="70" rx="18"/><text class="txt" x="48" y="43">User</text>
    <line class="line" x1="150" y1="35" x2="230" y2="35"/>
    <rect class="box" x="230" width="150" height="70" rx="18"/><text class="txt" x="282" y="43">API</text>
    <line class="line" x1="380" y1="35" x2="460" y2="35"/>
    <rect class="box" x="460" width="190" height="70" rx="18"/><text class="txt" x="500" y="43">Planner</text>
    <line class="line" x1="650" y1="35" x2="730" y2="35"/>
    <rect class="box" x="730" width="170" height="70" rx="18"/><text class="txt" x="775" y="43">Tools</text>
    <line class="line" x1="900" y1="35" x2="980" y2="35"/>
    <rect class="box" x="980" width="150" height="70" rx="18"/><text class="txt" x="1028" y="43">Trace</text>
  </g>
  <text class="txt" x="80" y="260">1. Request accepted → 2. Plan created → 3. Retrieval and memory loaded → 4. Tools called safely → 5. Critic review → 6. Approval or final result</text>
</svg>
