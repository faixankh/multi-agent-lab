apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentos-api
  template:
    metadata:
      labels:
        app: agentos-api
    spec:
      containers:
        - name: api
          image: agentos-api:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: agentos-api
spec:
  selector:
    app: agentos-api
  ports:
    - port: 8000
      targetPort: 8000
